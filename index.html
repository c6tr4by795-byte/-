<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRAQ GREEN</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-card">

    <div class="logo">

        🌳

    </div>

    <h1>IRAQ GREEN</h1>

    <p>منصة العراق الأخضر</p>

    <input
        id="name"
        type="text"
        placeholder="الاسم الكامل">

    <input
        id="email"
        type="email"
        placeholder="البريد الإلكتروني">

    <input
        id="password"
        type="password"
        placeholder="كلمة المرور">

    <button id="registerBtn">

        إنشاء حساب

    </button>

    <button id="loginBtn">

        تسجيل الدخول

    </button>

    <button id="googleBtn">

        تسجيل بواسطة Google

    </button>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
