<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العراق الأخضر | دخول</title>
    <!-- مكتبات Firebase الأساسية -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0B-toxH6Khu8961ENiq6DrEeWlkauKvU",
            authDomain: "mohmmed-ef63d.firebaseapp.com",
            projectId: "mohmmed-ef63d",
            storageBucket: "mohmmed-ef63d.firebasestorage.app",
            messagingSenderId: "670249943171",
            appId: "1:670249943171:web:3cf48a7c06210b9bd05bb6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleAction = (isSignup) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if (isSignup) {
                createUserWithEmailAndPassword(auth, email, pass)
                    .then(() => alert("تم إنشاء الحساب!"))
                    .catch(err => alert("خطأ في الإنشاء: " + err.message));
            } else {
                signInWithEmailAndPassword(auth, email, pass)
                    .then(() => alert("تم تسجيل الدخول بنجاح!"))
                    .catch(err => alert("خطأ في الدخول: " + err.message));
            }
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; color: white; margin-top: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="handleAction(true)" style="background: #065f46;">إنشاء حساب جديد</button>
        <button onclick="handleAction(false)" style="background: #451a03; margin-top:10px;">تسجيل الدخول</button>
    </div>
</body>
</html>
