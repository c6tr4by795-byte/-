<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>العراق الأخضر | دخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #065f46; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 30px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .toggle-btn { margin-top: 15px; color: #64748b; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- واجهة الإنشاء -->
    <div class="box" id="signupBox">
        <h2>إنشاء حساب جديد</h2>
        <input type="text" id="s_name" placeholder="الاسم الكامل">
        <input type="number" id="s_age" placeholder="العمر">
        <input type="text" id="s_city" placeholder="المحافظة">
        <input type="email" id="s_email" placeholder="البريد الإلكتروني">
        <button onclick="handleSignup()">تأكيد التسجيل</button>
        <p class="toggle-btn" onclick="toggleView()">لديك حساب؟ سجل دخولك</p>
    </div>

    <!-- واجهة الدخول -->
    <div class="box hidden" id="loginBox">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="l_name" placeholder="أدخل اسمك المسجل">
        <button onclick="handleLogin()">دخول</button>
        <p class="toggle-btn" onclick="toggleView()">ليس لديك حساب؟ أنشئ حساباً</p>
    </div>

    <!-- لوحة التحكم -->
    <div class="box hidden" id="dashboard">
        <h2>أهلاً بك مجدداً</h2>
        <p id="profileData"></p>
        <button onclick="location.reload()">تسجيل خروج</button>
    </div>

    <script>
        function toggleView() {
            document.getElementById('signupBox').classList.toggle('hidden');
            document.getElementById('loginBox').classList.toggle('hidden');
        }

        function handleSignup() {
            const name = document.getElementById('s_name').value;
            localStorage.setItem('user_name', name);
            localStorage.setItem('user_age', document.getElementById('s_age').value);
            localStorage.setItem('user_city', document.getElementById('s_city').value);
            alert('تم إنشاء حسابك يا ' + name);
            toggleView();
        }

        function handleLogin() {
            const inputName = document.getElementById('l_name').value;
            if (localStorage.getItem('user_name') === inputName) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('profileData').textContent = 
                    `الاسم: ${inputName} | العمر: ${localStorage.getItem('user_age')} | المحافظة: ${localStorage.getItem('user_city')}`;
            } else {
                alert('الاسم غير صحيح!');
            }
        }
    </script>
</body>
</html>
