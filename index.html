<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول حقيقي</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0B-toxH6Khu8961ENiq6DrEeWlkauKvU",
            authDomain: "mohmmed-ef63d.firebaseapp.com",
            projectId: "mohmmed-ef63d",
            storageBucket: "mohmmed-ef63d.firebasestorage.app",
            messagingSenderId: "670249943171",
            appId: "1:670249943171:web:3cf48a7c06210b9bd05bb6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signup() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => alert("تم إنشاء الحساب!"))
                .catch(e => alert(e.message));
        }

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    // هنا الطلب مالتك: صفحة بيضاء فارغة
                    document.body.innerHTML = '<div style="background:white; height:100vh;"></div>';
                })
                .catch(e => alert(e.message));
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="signup()" style="background: #065f46;">إنشاء حساب</button>
        <button onclick="login()" style="background: #451a03; margin-top:10px;">تسجيل دخول</button>
    </div>
</body>
</html>
