<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العراق الأخضر | احترافي</title>
    <!-- خط حديث ومريح للعين -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #065f46; 
            --bg: #f8fafc; /* بياض ناصع ومريح */
            --card: #ffffff;
            --text: #1e293b;
            --shadow: 0 20px 40px rgba(0,0,0,0.08); /* ظل ناعم جداً */
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .box { 
            background: var(--card); 
            padding: 50px; 
            border-radius: 30px; /* حواف دائرية عالية */
            width: 85%; 
            max-width: 400px; 
            box-shadow: var(--shadow); 
            text-align: center; 
            border: 1px solid rgba(0,0,0,0.05);
        }
        h2 { color: var(--primary); margin-bottom: 30px; font-weight: 700; }
        input { 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border-radius: 15px; /* حواف دائرية للبكسل العالي */
            border: 2px solid #e2e8f0; 
            background: #f1f5f9; 
            color: #1e293b; 
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            border: none; 
            border-radius: 15px; 
            color: white; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 20px;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); opacity: 0.95; }
        .toggle-btn { margin-top: 25px; font-size: 0.9rem; color: #64748b; cursor: pointer; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div class="box" id="authBox">
        <h2 id="formTitle">إنشاء حساب</h2>
        <form id="mainForm">
            <input type="text" id="name" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <button type="submit" id="submitBtn">بدء الرحلة</button>
        </form>
        <p class="toggle-btn" id="toggleText">لديك حساب بالفعل؟ سجل دخولك</p>
    </div>

    <div class="box" id="dashboard">
        <h2 id="welcomeMsg">أهلاً بك</h2>
        <p style="color: #64748b;">نحن سعداء بوجودك في منصتنا المتطورة.</p>
        <button onclick="location.reload()">تسجيل خروج</button>
    </div>

    <script>
        const authBox = document.getElementById('authBox'), dashboard = document.getElementById('dashboard'), formTitle = document.getElementById('formTitle'), submitBtn = document.getElementById('submitBtn'), toggleText = document.getElementById('toggleText'), mainForm = document.getElementById('mainForm');
        let isLogin = false;

        toggleText.onclick = () => {
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? "تسجيل الدخول" : "إنشاء حساب";
            submitBtn.textContent = isLogin ? "دخول" : "بدء الرحلة";
            toggleText.textContent = isLogin ? "ليس لديك حساب؟" : "لديك حساب بالفعل؟";
        };

        mainForm.onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            if (!isLogin) {
                localStorage.setItem('user_name', name);
                alert('تم التفعيل يا ' + name + '!');
            } else {
                if (localStorage.getItem('user_name') === name) {
                    authBox.style.display = 'none';
                    dashboard.style.display = 'block';
                    document.getElementById('welcomeMsg').textContent = "أهلاً " + name;
                } else {
                    alert('البيانات غير صحيحة!');
                }
            }
        };
    </script>
</body>
</html>
