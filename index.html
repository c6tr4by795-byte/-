<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العراق الأخضر - دخول حقيقي</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0B-toxH6Khu8961ENiq6DrEeWlkauKvU",
            authDomain: "mohmmed-ef63d.firebaseapp.com",
            projectId: "mohmmed-ef63d",
            storageBucket: "mohmmed-ef63d.firebasestorage.app",
            messagingSenderId: "670249943171",
            appId: "1:670249943171:web:3cf48a7c06210b9bd05bb6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // جعل الدوال متاحة عالمياً للضغط على الأزرار
        window.signUp = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => alert("تم إنشاء الحساب بنجاح في قاعدة البيانات!"))
                .catch((error) => alert("خطأ: " + error.message));
        };

        window.signIn = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    document.body.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100vh;"><h1>مرحباً بك في لوحة التحكم الحقيقية</h1></div>';
                })
                .catch((error) => alert("خطأ في الدخول: " + error.message));
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 20px; width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #065f46; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="signUp()">إنشاء حساب جديد</button>
        <p></p>
        <button onclick="signIn()" style="background:#451a03;">تسجيل الدخول</button>
    </div>

</body>
</html>
