<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العراق الأخضر</title>
    <style>
        :root {
            --primary: #065f46; 
            --earth-brown: #451a03;
            --bg: #1a1512;
            --card: #291e18;
            --text: #f5f5f4;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border-bottom: 5px solid var(--primary); }
        h2 { color: var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--earth-brown); background: #3d2b1f; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .toggle-btn { margin-top: 15px; font-size: 0.85rem; color: #d6d3d1; cursor: pointer; }
        #dashboard { display: none; } /* مخفي حتى يسجل دخول */
    </style>
</head>
<body>

    <!-- واجهة الدخول -->
    <div class="box" id="authBox">
        <h2 id="formTitle">إنشاء حساب</h2>
        <form id="mainForm">
            <input type="text" id="name" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <button type="submit" id="submitBtn">إنشاء الحساب</button>
        </form>
        <p class="toggle-btn" id="toggleText">لديك حساب بالفعل؟ سجل دخولك</p>
    </div>

    <!-- واجهة المحتوى (تظهر بعد الدخول) -->
    <div class="box" id="dashboard">
        <h2 id="welcomeMsg">أهلاً بك</h2>
        <p>تم تسجيل دخولك بنجاح في منصة العراق الأخضر.</p>
        <button onclick="location.reload()">تسجيل خروج</button>
    </div>

    <script>
        const authBox = document.getElementById('authBox');
        const dashboard = document.getElementById('dashboard');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const mainForm = document.getElementById('mainForm');
        let isLogin = false;

        toggleText.onclick = () => {
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? "تسجيل الدخول" : "إنشاء حساب";
            submitBtn.textContent = isLogin ? "دخول" : "إنشاء الحساب";
            toggleText.textContent = isLogin ? "ليس لديك حساب؟ أنشئ واحداً" : "لديك حساب بالفعل؟ سجل دخولك";
        };

        mainForm.onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            
            if (!isLogin) {
                localStorage.setItem('user_name', name);
                alert('تم إنشاء الحساب، يرجى الدخول الآن.');
            } else {
                if (localStorage.getItem('user_name') === name) {
                    authBox.style.display = 'none';
                    dashboard.style.display = 'block';
                    document.getElementById('welcomeMsg').textContent = "أهلاً بك يا " + name;
                } else {
                    alert('خطأ في الاسم!');
                }
            }
        };
    </script>
</body>
</html>
